<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Saya</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header>
        <div class="logo">
            <img src="Y.png" width=100px height="100px" alt="logo">
        </div>

        <nav>
            <a href="index.html">Home</a>
            <a href="profile.html">Our Profile</a>
            <a href="#">Portfolio</a>
            <a href="#" class="btn-message">Message Us</a>
        </nav>
    </header>

    <hr class="garis-full">
    <main>
        <section class="hero">
            <h1 id="welcome-title">Olla, everyone!</h1>
            <p>Ini adalah website latihan pemula milik saya.</p>
            <div class="hero-placeholder">1366x578</div>
        </section>

        <hr class="garis-full">

        <section class="headquarter">
            <h2>Our Headquarter</h2>
            <div class="city-container">
                <div class="city-item">
                    <div class="circle"></div>
                    <p></p>Jakarta</p>
                </div>
                <div class="city-item">
                    <div class="circle"></div>
                    <p>Surabaya</p>
                </div>
                <div class="city-item">
                    <div class="circle"></div>
                    <p>Bandung</p>
                </div>
            </div>
        </section>

        <hr class="garis-full">

        <section class="message-us">
            <h2>Message Us</h2>
            <div class="form-wrapper">
                <div class="form-box">
                    <form id="mainForm">
                        <div class="form-group">
                            <label>Nama</label>
                            <span>:</span>
                            <input type="text" id="in-nama" placeholder="Nama" required>
                        </div>
                        <div class="form-group">
                            <label>Tanggal Lahir</label>
                            <span>:</span>
                            <input type="date" id="input-tgl">
                        </div>
                        <div class="form-group">
                            <label>Jenis Kelamin</label>
                            <span>:</span>
                            <div class="radio-group">
                                <input type="radio" name="gender" value="Laki-Laki" id="laki" checked>
                                <label for="laki">Laki-Laki</label>
                                <input type="radio" name="gender" value="Perempuan" id="perempuan">
                                <label for="perempuan">Perempuan</label>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Pesan</label>
                            <span>:</span>
                            <textarea id="input-pesan" placeholder="Pesan"></textarea>
                        </div>
                        <button type="submit" id="submit-btn">Submit</button>
                    </form>
                </div>

                <div class="result-box">
                    <p><b>Current time : <span id="res-time">-</span></p>
                    <br />
                    <p>Nama : <span id="res-nama"></span></p>
                    <p>Tanggal Lahir : <span id="res-tgl"></span></p>
                    <p>Jenis Kelamin : <span id="res-gender"></span></p>
                    <p>Pesan : <span id="res-pesan"></span></p>
                </div>
                </b>
            </div>
            </div>
        </section>
    </main>

    <footer>
        <p>Created By Yasmin - Penugasan RevoU</p>
    </footer>

    <script src="js/script.js"></script>
</body>

</html>
